# ========================================
# AUTOMATION PÉRIODIQUE
# Envoyer toutes les valeurs toutes les 30s
# ========================================
- alias: "ESP32 - Rafraîchir toutes les infos"
  trigger:
    - platform: time_pattern
      seconds: "/30"  # Toutes les 30 secondes
  action:
    # Puissance
    - service: mqtt.publish
      data:
        topic: "stationair/info/puissance"
        payload: "{{ states('sensor.power_consumption') | float(0) }}"
    
    # Production PV
    - service: mqtt.publish
      data:
        topic: "stationair/info/pv"
        payload: "{{ states('sensor.solar_production') | float(0) }}"
    
    # Température extérieure
    - service: mqtt.publish
      data:
        topic: "stationair/info/temp_ext"
        payload: "{{ states('sensor.outdoor_temperature') | float(0) }}"
    
    # Consommation jour
    - service: mqtt.publish
      data:
        topic: "stationair/info/conso_jour"
        payload: "{{ states('sensor.daily_energy_consumption') | float(0) }}"
    
    # Prix électricité
    - service: mqtt.publish
      data:
        topic: "stationair/info/prix_elec"
        payload: "{{ states('sensor.electricity_price') | float(0) }}"
    
    # Batterie SOC
    - service: mqtt.publish
      data:
        topic: "stationair/info/batterie_soc"
        payload: "{{ states('sensor.battery_soc') | float(0) }}"

