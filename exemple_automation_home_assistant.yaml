# ========================================
# AUTOMATIONS HOME ASSISTANT
# Pour envoyer des données vers l'ESP32
# ========================================

# ===== ENVOYER LA PUISSANCE SOUTIRÉE =====
# Déclenché quand la puissance change
- alias: "ESP32 - Envoyer Puissance Soutirée"
  trigger:
    - platform: state
      entity_id: sensor.power_consumption  # ← Remplacer par votre sensor
  action:
    - service: mqtt.publish
      data:
        topic: "stationair/info/puissance"
        payload: "{{ states('sensor.power_consumption') }}"
        retain: false

# ===== ENVOYER LA PRODUCTION PV =====
- alias: "ESP32 - Envoyer Production PV"
  trigger:
    - platform: state
      entity_id: sensor.solar_production  # ← Remplacer par votre sensor
  action:
